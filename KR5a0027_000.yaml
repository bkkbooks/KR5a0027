front:
  text: 元始天尊說北方真武妙經妟七
  hash: sha256:492cb1d3013ba2a183ba670aa9cc5611c9c1d1f821f53bc0b1f4a25af4519994
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0027_HFL_000-001a, image: hfl/0027/0027-044.png}
body:
  text: 仰啓呪仰啓玄天大聖者北方壬癸至靈神金闕真尊應化身無上將軍號真武威容赫奕太隂君列宿虛危分秀氣雙睛掣電伏羣魔萬騎如雲威九地紫袍金帶佩神鋒蒼龜巨蛇捧聖足六丁玉女左右隨八殺將軍前後衛消災降福不思議歸命一心今奉禮爾時元始天尊於龍漢元年七月十五日於八景天宫上元之殿安祥五雲之座與三十六天帝十極真人無量飛天大神玉童玉女侍衛左右一時同會鼓動法音天樂自響大衆欣然咸聽天尊說無上至真妙法是時上元天宫東北方大震七聲天門忽開下觀世界乃有黑毒血光穢雜之氣幽幽冥冥從人間東北方直上衝天盤結不散大衆咸驚默然不敢議問時會中有一真人名曰妙行威德充備諸天欽仰越班而出執簡長跪上白天尊曰沉此境清靜太陽道境何得有此黑毒之氣盤結衝上是何異因唯願天尊至聖為衆宣說絶其疑慮天尊告曰汝等妙行能為衆生發問是由汝當復坐靜默安神吾當為說天尊曰下元生人皆剪清靜氤氳真一之形悉備三萬六千神氣扶衛其身今巳隂陽數盡劫運將終魔鬼流行信從邢道不省本源諂求餘福昏迷沉亂不忠不孝不義不仁好樂邪神禱祭魔法今為六天魔鬼枉所傷害或老或少或男或女未盡天年橫被傷殺本非死期魂無可託鬼毒流盛死魂不散怨怒上衝盤結惡氣汝當省知於是妙行真人與諸大衆聞是說巳心大驚怖欲請天尊威光暫降下方收除魔鬼救度衆生拔濟幽魂去離邪橫大衆懷疑未敢天尊告曰不勞吾威神此去北方自有大神將號曰真武部衆勇猛極能降伏邢道收斬妖魔真人上白天尊曰不審此位神將生居天界修何道德為於神將天尊告曰昔有淨樂國王與善勝皇后夢吞日光覺而有娠懷胎十四箇月於開皇元年甲辰之歲三月建辰初三日午時誕於王宫生而神靈長而勇猛不統王位唯務修行輔助玉帝誓斷天下妖魔救護羣品日夜於王宫中發此誓願父王不能禁制遂捨家辭父母入武當山中修道四十二年功成果滿白日登天王帝聞其勇猛勑鎮北方統攝真武之位以斷天下妖邪真人上白天尊曰如何得此神將入於下方收除魔鬼救度羣生免遭橫死日有所益伏願大慈天尊遂其所請乃勑右侍玉童馳詔真符一道徑往北方召其真武神將其神䝉召部領神衆徑到天尊前長跪巨巳奉玉帝勑命位鎮北方今日何緣得覩慈顏特䝉符召天尊告曰吾於上元宫中大會說法忽下方黑毒怨氣衝上天界大衆咸驚汝宜往彼收斷妖魔拔濟魂爽真武神將敬奉天尊教勑乃披髮蹺足踏螣蛇八卦神龜部領三十萬神將六丁六甲五雷神兵巨虬獅子毒龍猛獸前後導從齊到下方七日之中天下妖魔一時收斷人鬼分離寬魂解散生人安泰國土清平真武神將與諸部衆還歸上元宮中朝見天尊曰昨舉教命往下方收斬妖魔仗慈尊力乃於七日之內天下邪鬼並皆清蕩天尊曰善哉汝等諸神得無勞乎於是真武神將乃交乾布年魁罡激指上佐天關而作呪曰太隂化生水位之精虛危上應龜蛇合形周行六合威攝萬靈無幽不察無願不成劫終劫始剪伐魔精救護羣品家國咸寧數中未甲妖氣流行上帝有勑吾故降靈闡揚正法蕩邪辟兵化育黎兆協贊中與敢有小鬼欲來現形吾目一視五嶽摧傾急急如律令奉禮呪曰大初太易無象無形莫知重濁孰辨輕清吾於混沌分其昏明天得以健地得以寧民得以養物得以萌邪得以正神得以靈三才之內萬類咸亨大朴既散仁義乃興禮樂既作姦邪斯行六誼或失四民有爭上不寬恕下不忠貞或魔或鬼或妖或精恣橫荼毒千擾生民全家疾患纍歲官刑財物耗散骨肉伶仃性命枉逝災禍相縈穢雜之氣上逹天庭天尊有命令與安平有妖皆剪無鬼不烹瘟疫之吏東首伏應鬼精滅爽邢魔推傾量有十萬力士五千萬兵天上天下從吾降升拒吾者滅奉吾者生惡吾者辱敬吾者榮禮吾者壽非吾者薨吾有此令人鬼咸聽急急如律令又呪曰北方玄天杳杳神君億千變化玄武靈真騰天倒地驅雷奔雲隊仗千萬掃蕩妖氛雷公侍從玉女將軍鬼神降伏龍虎潜奔威震五嶽萬靈咸遵鳴鐘擊鼓遊行乾坤收捕逆鬼破碎魔軍除邪輔正道氣常臻急急如律今天尊告真武曰自今後凡遇甲子庚申每月三七日宜一人間受人之醮祭察人之善惡修學功過年命長短可依吾教供養轉經衆具來降魔精消伏斷滅不祥過去超生九幽息對見存獲慶天下和平爾時妙行真人與諸天帝無量飛天神王真仙大衆聞說莫不歡喜踴躍一時作禮讃歎功德我等今日䝉大法利益請於人世救護衆生令得免三災患難各各受持稽首奉行真武神將再奉天尊勑永鎮北方奉辭而退元始天尊說北方真武妙經
